services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/forecast?spotId=point-1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
